services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: bezp-postgres
    environment:
      POSTGRES_DB: bezp
      POSTGRES_USER: bezp
      POSTGRES_PASSWORD: bezp_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis/redis-stack-server:7.2.0-v10
    container_name: bezp-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data:
